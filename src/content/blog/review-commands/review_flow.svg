<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#111827" stroke="#334155"/>

  <text x="80" y="110" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="700">Reviewing AI code with temporary Git branches</text>
  <text x="80" y="150" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Persist the AI snapshot, review as working-tree changes, then commit only your feedback.</text>

  <line x1="120" y1="310" x2="1040" y2="310" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <line x1="560" y1="310" x2="700" y2="210" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <line x1="700" y1="210" x2="900" y2="210" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  <line x1="900" y1="210" x2="1000" y2="310" stroke="#475569" stroke-width="8" stroke-linecap="round"/>

  <circle cx="220" cy="310" r="20" fill="#1f2937" stroke="#60a5fa" stroke-width="6"/>
  <circle cx="390" cy="310" r="20" fill="#1f2937" stroke="#60a5fa" stroke-width="6"/>
  <circle cx="560" cy="310" r="20" fill="#1f2937" stroke="#60a5fa" stroke-width="6"/>
  <circle cx="720" cy="310" r="20" fill="#1f2937" stroke="#22c55e" stroke-width="6"/>
  <circle cx="1000" cy="310" r="20" fill="#1f2937" stroke="#f59e0b" stroke-width="6"/>
  <circle cx="820" cy="210" r="20" fill="#1f2937" stroke="#a78bfa" stroke-width="6"/>

  <text x="210" y="355" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">A</text>
  <text x="380" y="355" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">B</text>
  <text x="550" y="355" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">C</text>
  <text x="702" y="355" fill="#d1fae5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">D</text>
  <text x="992" y="355" fill="#fef3c7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">E</text>
  <text x="804" y="255" fill="#ede9fe" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">review branch</text>

  <rect x="620" y="390" width="210" height="42" rx="10" fill="#14532d"/>
  <text x="640" y="417" fill="#dcfce7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">AI snapshot commit</text>

  <rect x="880" y="390" width="220" height="42" rx="10" fill="#78350f"/>
  <text x="900" y="417" fill="#fef3c7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">review feedback commit</text>

  <rect x="730" y="120" width="300" height="56" rx="12" fill="#4c1d95"/>
  <text x="750" y="145" fill="#f5f3ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">${USER}/review_in_progress</text>
  <text x="750" y="166" fill="#ddd6fe" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">same diff, but editable in your IDE</text>

  <rect x="120" y="470" width="920" height="72" rx="16" fill="#0b1220" stroke="#334155"/>
  <text x="150" y="500" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">review_start</text>
  <text x="275" y="500" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">commit AI changes on your branch, create review branch, soft-reset one commit</text>
  <text x="150" y="530" fill="#fbbf24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">review_done</text>
  <text x="275" y="530" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">switch back, delete review branch, commit only what you changed during review</text>
</svg>
